<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatSync — Insert Statistic</title>
    <link rel="stylesheet" href="dialog.css" />
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>

<body>
    <div id="dialog-app">
        <!-- View: List -->
        <div id="view-list" class="view-container" style="display: flex; flex-direction: column; height: 100%;">
            <div class="dialog-header">
                <span class="dialog-header-icon">📊</span>
                <span class="dialog-header-title">Insert Statistic</span>
            </div>

            <div class="dialog-search">
                <span class="dialog-search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search by label..." autofocus />
                <button class="dialog-search-clear" id="search-clear" style="display:none">✕</button>
            </div>

            <div class="dialog-list" id="dialog-list">
                <!-- Dynamically populated -->
            </div>

            <div class="dialog-footer">
                <span class="dialog-footer-hint"><kbd>↑↓</kbd> navigate · <kbd>→</kbd> configure · <kbd>Enter</kbd>
                    insert · <kbd>Esc</kbd> cancel</span>
            </div>
        </div>

        <!-- View: Config -->
        <div id="view-config" class="view-container" style="display: none; height: 100%; flex-direction: column;">
            <div class="dialog-header">
                <button id="config-back"
                    style="background:none; border:none; color:white; font-size:16px; cursor:pointer; margin-right:8px;">←</button>
                <span class="dialog-header-title">Configure Statistic</span>
            </div>
            <div style="padding: 10px 16px; background: white; border-bottom: 1px solid #e8eaed; font-weight: 600; font-size: 13px; flex-shrink: 0;"
                id="config-stat-name">
            </div>

            <div style="flex: 1; overflow-y: auto; padding: 12px 16px; background: white;">
                <div
                    style="font-size: 11px; font-weight: 600; color: #5f6368; text-transform: uppercase; margin-bottom: 8px;">
                    Report Fields</div>
                <div class="fields-checklist" id="config-fields-list"
                    style="display: flex; flex-direction: column; gap: 6px;">
                    <!-- Dynamically populated checkboxes -->
                </div>

                <div class="preview-box"
                    style="margin-top: 16px; background:#f8f9fa; border:1px solid #dadce0; border-radius:6px; padding:10px;">
                    <div
                        style="font-size:10px; font-weight:600; color:#5f6368; text-transform:uppercase; margin-bottom:4px;">
                        Preview</div>
                    <div id="config-preview-text"
                        style="font-family:'Times New Roman',serif; font-size:13px; color: #202124;"></div>
                </div>
            </div>

            <div class="dialog-footer"
                style="display: flex; justify-content: space-between; align-items: center; padding: 10px 16px;">
                <span style="font-size:11px; color:#80868b;"><kbd>Enter</kbd> insert · <kbd>Esc</kbd> back</span>
                <button id="config-btn-insert"
                    style="background:#1a73e8; color:white; border:none; padding:6px 16px; border-radius:6px; cursor:pointer; font-weight:500;">Insert</button>
            </div>
        </div>
    </div>

    <script src="dialog.js"></script>
</body>

</html>

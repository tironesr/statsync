<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>StatSync</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div id="app"><div id="autocomplete-popup" class="autocomplete-popup" style="display: none"><div class="autocomplete-header"><span class="autocomplete-icon">⚡</span> <span class="autocomplete-title">StatSync Autocomplete</span> <span class="autocomplete-trigger-text"></span></div><div class="autocomplete-list"></div><div class="autocomplete-hint"><kbd>↑↓</kbd> navigate · <kbd>Enter</kbd> insert · <kbd>Esc</kbd> dismiss</div></div><header class="statsync-header"><div class="header-top"><div><h1>📊 StatSync</h1><p class="status-text" id="status">No data loaded</p></div><span class="version-badge">v1.0</span></div></header><section class="panel connection-panel" id="connection-panel"><div class="button-row"><button class="btn btn-live" id="btn-connect-server"><span class="live-dot"></span> Live</button> <button class="btn btn-outline" id="btn-load-file"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 10v3a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-3"/><polyline points="5 6 8 3 11 6"/><line x1="8" y1="3" x2="8" y2="11"/></svg> Open File</button></div><input type="file" id="file-input" accept=".json,.statsync.json" style="display: none"/><div class="server-config" id="server-config" style="display: none"><input id="server-url" placeholder="http://localhost:8877" value="http://localhost:8877"/> <button class="btn btn-small btn-primary" id="btn-server-go">Connect</button></div></section><section class="panel search-panel" id="search-panel" style="display: none"><div class="search-box"><svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg> <input id="search-input" placeholder="Search models..."/> <button class="search-clear" id="search-clear" style="display:none">✕</button></div><div class="filter-chips" id="filter-chips"></div></section><section class="panel" id="models-panel" style="display: none"><div class="panel-header"><h2>Models & Tests</h2><span class="stat-count" id="stat-count"></span></div><div id="models-list" class="models-list"></div></section><section class="panel" id="tables-panel" style="display: none"><div class="panel-header"><h2>Tables</h2></div><div id="tables-list" class="tables-list"></div></section><section class="panel" id="update-panel" style="display: none"><button class="btn btn-outline full-width" id="btn-pause-sync">⏸ Pause Automatic Syncing</button> <button class="btn btn-primary full-width" id="btn-manual-sync" style="display: none; margin-top: 8px;">🔄 Sync All Updates</button><div id="update-result" class="update-result" style="display: none"></div></section><footer class="statsync-footer"><span id="project-name">—</span> <span id="last-sync">—</span></footer></div><script src="taskpane.js"></script></body></html>
